
services:

  mysql:
    image: mysql:8
    container_name: mysql-local
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: techJob
      MYSQL_USER: user
      MYSQL_PASSWORD: ${PSWD}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  backend:
    image: maven:3.9.6-eclipse-temurin-21
    container_name: spring-app-dev
    working_dir: /app
    command: mvn spring-boot:run
    ports:
      - "7777:7777"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/techJob
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: ${PSWD}
      JWT_SECRET: ${JWT_SECRET}
      EMAIL: ${EMAIL}
      EMAIL_SENDER: ${EMAIL_SENDER}
    volumes:
      - .:/app
      - ~/.m2:/root/.m2
      - ./uploads:/app/uploads
    depends_on:
      - mysql

volumes:
  mysql-data:
services:

  mysql:
    image: mysql:8
    container_name: mysql-local
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: techJob
      MYSQL_USER: user
      MYSQL_PASSWORD: ${PSWD}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  backend:
    build: .
    container_name: spring-app
    ports:
      - "7777:7777"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JWT_SECRET: ${JWT_SECRET}
      EMAIL: ${EMAIL}
      EMAIL_SENDER: ${EMAIL_SENDER}
      PSWD: ${PSWD}
    depends_on:
      - mysql

volumes:
  mysql-data:
version: '3.8'

services:

  mysql:
    image: mysql:8
    container_name: marketplace_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PSWD}
      MYSQL_DATABASE: marketplace
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

	  redis:
	      image: redis:7
	      restart: always
	      ports:
	        - "6379:6379"

	    app:
	      build: .
	      depends_on:
	        - mysql
	        - redis
	      ports:
	        - "8080:8080"
	      environment:
	        JWT_SECRET: ${JWT_SECRET}
	        SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/techjob
	        SPRING_DATASOURCE_USERNAME: root
	        SPRING_DATASOURCE_PASSWORD: root

	  volumes:
	    mysql_data:
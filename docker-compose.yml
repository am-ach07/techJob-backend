version: '3.8'

services:

  mysql:
    image: mysql:8
    container_name: marketplace_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PSWD}
      MYSQL_DATABASE: marketplace
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
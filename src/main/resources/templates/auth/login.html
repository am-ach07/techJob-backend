<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Marketplace</title>
<style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .container { background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 350px; }
    h2 { text-align: center; color: #333; margin-bottom: 1.5rem; }
    form { display: flex; flex-direction: column; }
    label { margin-bottom: 0.5rem; font-weight: 600; color: #555; }
    input { padding: 10px; margin-bottom: 1rem; border: 1px solid #ddd; border-radius: 5px; font-size: 1rem; }
    button { background-color: #28a745; color: white; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-size: 1rem; transition: background 0.3s; }
    button:hover { background-color: #218838; }
    .link { text-align: center; margin-top: 1rem; font-size: 0.9rem; }
    a { color: #007bff; text-decoration: none; }
    a:hover { text-decoration: underline; }
    
    /* تنسيق رسائل الخطأ والنجاح */
    .alert { padding: 10px; border-radius: 5px; margin-bottom: 15px; font-size: 0.9rem; text-align: center; }
    .alert-error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    .alert-success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
</style>
</head>
<body>
<div class="container">
    <h2>Welcome Back</h2>
    
    <div th:if="${loginError}" class="alert alert-error">
        <span th:text="${loginError}"></span>
    </div>
    <form th:action="@{/login}" th:object="${loginRequest}" method="post">
        
		<input type="hidden" name="_csrf" th:value="${csrfToken}" />

        <label for="username">Username or Email</label>
        <input type="text" th:field="*{usernameOrEmail}" id="username" placeholder="Enter your details" >
        
        <label for="password">Password</label>
        <input type="password" th:field="*{password}" id="password" placeholder="Enter your password" >
        
        <button type="submit">Log In</button>
    </form>
    
    <div class="link">
        New here? <a th:href="@{/signup}">Create an account</a>
    </div>
</div>
</body>
</html>

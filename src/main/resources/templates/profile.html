<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
	<meta charset="UTF-8">
	<title>My Profile - Marketplace</title>

	<style>
		:root {
			--primary: #1877f2;
			--bg: #f0f2f5;
			--card: #ffffff;
			--text: #1c1e21;
			--muted: #65676b;
			--border: #e4e6eb;
		}

		body {
			margin: 0;
			font-family: 'Segoe UI', sans-serif;
			background: var(--bg);
			display: flex;
		}

		.sidebar {
			width: 260px;
			background: #fff;
			border-right: 1px solid var(--border);
		}

		.sidebar a {
			padding: 12px 25px;
			display: block;
			text-decoration: none;
			font-weight: 600;
			color: #606770;
		}

		.sidebar a.active {
			background: #e7f3ff;
			color: var(--primary);
		}

		/* ===== PROFILE LAYOUT ===== */

		.main-content {
			flex: 1;
			padding: 40px;
		}

		.profile-wrapper {
			max-width: 900px;
			margin: auto;
		}

		/* ===== HEADER ===== */

		.profile-header {
			background: linear-gradient(135deg, #1877f2, #4f9cff);
			border-radius: 16px;
			padding: 30px;
			color: white;
			display: flex;
			align-items: center;
			gap: 25px;
			margin-bottom: 30px;
		}

		.profile-header img {
			width: 120px;
			height: 120px;
			border-radius: 50%;
			object-fit: cover;
			border: 4px solid white;
		}

		.profile-header h2 {
			margin: 0;
		}

		.profile-header span {
			opacity: .9;
		}

		/* ===== SECTIONS ===== */

		.section {
			background: var(--card);
			border-radius: 14px;
			padding: 25px;
			margin-bottom: 20px;
			box-shadow: 0 2px 8px rgba(0, 0, 0, .08);
		}

		.section h3 {
			margin-top: 0;
			margin-bottom: 20px;
		}

		/* ===== GRID ===== */

		.grid {
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 20px;
		}

		.field label {
			font-size: .8rem;
			color: var(--muted);
			display: block;
			margin-bottom: 5px;
		}

		.field input,
		.field textarea {
			width: 100%;
			padding: 9px;
			border-radius: 6px;
			border: 1px solid var(--border);
		}

		/* ===== ADDRESS ===== */

		.address-grid {
			display: grid;
			grid-template-columns: 2fr 1fr;
			gap: 20px;
		}

		/* ===== ARTISAN ===== */

		.artisan-box {
			background: #fdf7e6;
			border: 1px solid #ffe58f;
			border-radius: 10px;
			padding: 20px;
		}

		/* ===== ACTION ===== */

		.actions {
			text-align: right;
		}

		.actions button {
			background: var(--primary);
			color: white;
			border: none;
			padding: 10px 28px;
			border-radius: 8px;
			font-weight: bold;
			cursor: pointer;
		}

		.error-msg {
			color: #dc3545;
			font-size: 0.85rem;
			margin-bottom: 10px;
			display: block;
		}

		.global-error {
			background-color: #f8d7da;
			color: #721c24;
			padding: 10px;
			border-radius: 5px;
			margin-bottom: 15px;
			border: 1px solid #f5c6cb;
			text-align: center;
		}
	</style>
</head>

<body>

	<nav class="sidebar">
		<h2 style="text-align:center;color:var(--primary)">Marketplace</h2>
		<a href="/">🏠 Home</a>
		<a href="/profile" class="active">👤 Profile</a>
		<a href="/offers">🏷️ Offers</a>
		<a href="/orders">📦 Orders</a>
		<a href="/notification">🔔 Notifications</a>
		<a href="/settings">⚙️ Settings</a>
	</nav>

	<main class="main-content">
		<div class="profile-wrapper" th:object="${profile}">

			<!-- HEADER -->
			<form th:action="@{/profile}" th:object="${updateDTO}" method="post">
				<div class="profile-header">
					<div th:if="${error}" class="global-error" th:text="${error}"></div>
					<img th:src="*{user.profileImageUrl} ?: '/images/profiles/default-avatar.png'">
					<span class="error-msg" th:errors="*{user.profileImageUrl}"></span>
					<div>
						<h2 th:text="*{user.firstName}">Full Name</h2>
						<span class="error-msg" th:errors="*{user.firsName}"></span>
						<span th:text="*{user.username}">@username</span><br>
						<span class="error-msg" th:errors="*{user.username}"></span>
						<span th:text="*{user.role}"></span>
					</div>
				</div>

				<!-- BASIC INFO -->
				<div class="section">
					<h3>Personal Information</h3>
					<div class="grid">
						<div class="field">
							<label>Email</label>
							<input type="email" th:value="*{user.email}">
							<span class="error-msg" th:errors="*{user.email}"></span>
						</div>
						<div class="field">
							<label>Phone</label>
							<input type="tel" th:value="*{user.phoneNumber}">
							<span class="error-msg" th:errors="*{user.poneNumber}"></span>
						</div>
						<div class="field">
							<label>Gender</label>
							<select th:field="*{user.gender}">
								<option value="MALE">Male</option>
								<option value="FEMALE">Female</option>
							</select>
							<span class="error-msg" th:errors="*{user.gender}"></span>
						</div>
						<div class="field">
							<label>Age</label>
							<input type="number" th:value="*{user.age}">
							<span class="error-msg" th:errors="*{user.age}"></span>
						</div>
					</div>
				</div>

				<!-- ADDRESS -->
				<div class="section">
					<h3>Address</h3>
					<div class="address-grid">
						<div class="field">
							<label>Street Address</label>
							<input th:value="*{user.addressLine}">
							<span class="error-msg" th:errors="*{user.adressLine}"></span>
						</div>
						<div class="field">
							<label>Postal Code</label>
							<input th:value="*{user.postalCode}">
							<span class="error-msg" th:errors="*{user.postalCode}"></span>
						</div>
						<div class="field">
							<label>City</label>
							<input th:value="*{user.city}">
							<span class="error-msg" th:errors="*{user.city}"></span>
						</div>
						<div class="field">
							<label>Welaya</label>
							<input th:value="*{user.welaya}">
							<span class="error-msg" th:errors="*{user.wilaya}"></span>
						</div>
					</div>
				</div>

				<!-- ARTISAN -->
				<div class="section artisan-box" th:if="${isArtisan}">
					<h3>Professional Information</h3>
					<div class="field">
						<label>Skills</label>
						<input th:value="*{artisan.skills}">
						<span class="error-msg" th:errors="*{artisan.skills}"></span>
					</div>
					<div class="field" style="margin-top:15px">
						<label>Description</label>
						<textarea rows="4" th:text="*{artisan.description}"></textarea>
						<span class="error-msg" th:errors="*{artisan.description}"></span>
					</div>
				</div>

				<div class="actions">
					<button>Save Changes</button>
				</div>
			</form>
		</div>
	</main>

</body>

</html>
